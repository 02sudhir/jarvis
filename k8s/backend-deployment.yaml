apiVersion: apps/v1
kind: Deployment
metadata:
  name: cricket-analytics-backend
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cricket-analytics-backend
  template:
    metadata:
      labels:
        app: cricket-analytics-backend
    spec:
      containers:
      - name: backend
        image: cricket-analytics-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: cricket-analytics-config
              key: postgres_host
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: cricket-analytics-secrets
              key: jwt_secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
      imagePullSecrets:
      - name: crickey-registry-secret

---
apiVersion: v1
kind: Service
metadata:
  name: cricket-analytics-backend-service
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: cricket-analytics-backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cricket-analytics-backend-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cricket-analytics-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
